<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Aesthetic Portfolio</title>
    <style>
        /* Menggunakan Font yang Clean */
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(45deg, #0f0c29, #302b63, #24243e);
            overflow: hidden;
        }

        /* Animasi Latar Belakang (Lingkaran Bergerak) */
        .background-blob {
            position: absolute;
            width: 500px;
            height: 500px;
            background: linear-gradient(180deg, #ff0080, #7928ca);
            filter: blur(80px);
            border-radius: 50%;
            z-index: -1;
            animation: move 20s infinite alternate;
        }

        @keyframes move {
            from { transform: translate(-10%, -10%); }
            to { transform: translate(20%, 20%); }
        }

        /* Glassmorphism Card */
        .card {
            position: relative;
            width: 400px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            text-align: center;
            color: white;
            box-shadow: 0 25px 45px rgba(0,0,0,0.2);
            transition: 0.5s ease;
            animation: fadeIn 1.5s ease-out;
        }

        .card:hover {
            transform: translateY(-10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid #ff0080;
            margin-bottom: 20px;
            object-fit: cover;
        }

        h1 {
            font-size: 1.8rem;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        p {
            font-size: 0.9rem;
            color: #ccc;
            margin-bottom: 30px;
        }

        /* Tombol Animasi */
        .btn {
            display: inline-block;
            padding: 10px 30px;
            background: #fff;
            color: #302b63;
            text-decoration: none;
            border-radius: 30px;
            font-weight: 600;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .btn:hover {
            background: #ff0080;
            color: white;
            box-shadow: 0 10px 20px rgba(255, 0, 128, 0.4);
        }

        /* Social Icons Simpel */
        .socials {
            margin-top: 25px;
        }

        .socials a {
            color: white;
            margin: 0 10px;
            text-decoration: none;
            font-size: 0.8rem;
            opacity: 0.6;
            transition: 0.3s;
        }

        .socials a:hover {
            opacity: 1;
        }

    </style>
</head>
<body>

    <div class="background-blob"></div>

    <div class="card">
        <img src="https://via.placeholder.com/150" alt="Profile" class="profile-img">
        <h1>Halo, Saya [Nama Kamu]</h1>
        <p>Creative Developer | Tech Enthusiast | Coffee Addict</p>
        
        <a href="https://github.com/usernamekamu" class="btn">Kunjungi GitHub</a>

        <div class="socials">
            <a href="#">Instagram</a>
            <a href="#">LinkedIn</a>
            <a href="#">Twitter</a>
        </div>
    </div>

</body>
</html>
